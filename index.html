<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zayka Fast Food</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

  <!-- Welcome Page -->
  <div id="welcome">
    <h1>Welcome To Food Delivery</h1>
    <p>Fresh Food, Fast Delivery</p>
    <button id="startBtn" title="Enter">
      <i class="fa-solid fa-arrow-right"></i>
    </button>
  </div>

  <!-- Main Website -->
  <div id="mainPage" style="display:none;">
    <nav>
      <div class="logo">🍔 ZAYKA FAST FOOD</div>
      <button class="menu-toggle" aria-label="Menu" onclick="document.getElementById('navLinks').classList.toggle('open')">
        <i class="fa-solid fa-bars"></i>
      </button>
      <ul id="navLinks">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="orders.html">Order History</a></li>
        <li><a href="profile.html" id="navProfile"><i class="fa-solid fa-user"></i> Profile</a></li>
        <li><a href="login.html"><i class="fa-solid fa-lock"></i> Admin</a></li>
      </ul>
    </nav>

    <section class="hero">
      <h1>Online Food Delivery</h1>
      <p>Order Delicious Food At Your Doorstep</p>
      <br>
      <a href="menu.html" class="btn">Browse Menu &amp; Order</a>
    </section>

    <div class="container">
      <h2 class="section-title">Our Restaurants</h2>
      <div class="cards" id="restaurantCards"></div>
    </div>

    <div class="footer">© <span id="year"></span> Zayka Fast Food — HTML / CSS / JavaScript demo</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/customer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
