<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Zayka Fast Food</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

  <nav>
    <div class="logo">🍔 ZAYKA FAST FOOD</div>
    <button class="menu-toggle" aria-label="Menu" onclick="document.getElementById('navLinks').classList.toggle('open')">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="orders.html">Order History</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="login.html" class="active"><i class="fa-solid fa-lock"></i> Admin</a></li>
    </ul>
  </nav>

  <div class="form-box">
    <h2 class="section-title" style="margin-top:0;">🔐 Admin Login</h2>
    <form id="loginForm">
      <label>Username</label>
      <input type="text" id="username" placeholder="Username" required>
      <label>Password</label>
      <input type="password" id="password" placeholder="Password" required>
      <p class="error" id="loginError"></p>
      <button type="submit">Login</button>
    </form>
    <div class="hint">
      <b>Forgot password?</b> It can be reset from code — open
      <code>js/config.js</code> and edit <code>ADMIN_CREDENTIALS</code>.
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value;
      if (login(u, p)) {
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("loginError").textContent = "Invalid username or password.";
      }
    });
  </script>
</body>
</html>
