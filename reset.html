<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Data — Zayka Fast Food</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

  <nav>
    <div class="logo">🍔 ZAYKA FAST FOOD</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Admin</a></li>
    </ul>
  </nav>

  <div class="page container">
    <div class="form-box fade-up center">
      <h2 class="section-title" style="margin-top:0;">🧹 Reset App Data</h2>
      <p style="color:#777;margin-bottom:14px;">
        This clears <b>all stored data in this browser</b> — orders, customers,
        saved profile, restaurants/menu and the admin session.
      </p>

      <div class="hint" style="text-align:left;">
        Choose what to clear:
        <label style="font-weight:normal;margin-top:10px;">
          <input type="checkbox" id="optOrders" checked style="width:auto;"> Orders
        </label>
        <label style="font-weight:normal;">
          <input type="checkbox" id="optCustomers" checked style="width:auto;"> Customers + my profile
        </label>
        <label style="font-weight:normal;">
          <input type="checkbox" id="optRestaurants" style="width:auto;"> Restaurants &amp; menu (will re-seed defaults)
        </label>
      </div>

      <button class="btn-danger" onclick="doReset()">Delete Selected Data</button>
      <button class="btn-grey" onclick="window.location.href='index.html'">Cancel</button>

      <p class="center" id="result" style="margin-top:16px;font-weight:bold;color:#2e7d32;"></p>
    </div>
  </div>

  <div class="footer">© Zayka Fast Food</div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/customer.js"></script>
  <script>
    function doReset() {
      if (!confirm("Are you sure? This cannot be undone.")) return;
      const cleared = [];

      if (document.getElementById("optOrders").checked) {
        localStorage.removeItem(DB_KEYS.orders);
        cleared.push("orders");
      }
      if (document.getElementById("optCustomers").checked) {
        localStorage.removeItem(DB_KEYS.customers);
        localStorage.removeItem(CUSTOMER_SESSION_KEY);
        cleared.push("customers");
      }
      if (document.getElementById("optRestaurants").checked) {
        localStorage.removeItem(DB_KEYS.restaurants);
        cleared.push("restaurants");
      }
      // always end any admin session
      sessionStorage.removeItem("zayka_admin_session");

      document.getElementById("result").textContent =
        cleared.length ? "✅ Cleared: " + cleared.join(", ") + ". Done!"
                        : "Nothing selected.";
    }
  </script>
</body>
</html>
